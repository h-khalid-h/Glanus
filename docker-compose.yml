version: '3.8'
services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8055}:8055"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-glanus}:${POSTGRES_PASSWORD:-glanus}@db:5432/${POSTGRES_DB:-glanus}?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8055/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glanus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glanus}
      POSTGRES_DB: ${POSTGRES_DB:-glanus}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glanus} -d ${POSTGRES_DB:-glanus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
  redisdata:
